version: '3.9'

services:
  # ── MongoDB ───────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: crime_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: crimeIndexDB
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - crime_net

  # ── Application ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: crime_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/crimeIndexDB
      JWT_SECRET: ${JWT_SECRET:-crime_index_docker_secret_change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./public:/app/public:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - crime_net

  # ── Mongo Express (dev UI) ────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: crime_mongo_ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - crime_net
    profiles:
      - dev

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local

networks:
  crime_net:
    driver: bridge
