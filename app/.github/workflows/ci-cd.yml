name: CI/CD — Crime Index Dashboard

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  IMAGE_NAME: crime-index-dashboard

jobs:
  # ── Lint & Test ────────────────────────────────────
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint check
        run: |
          echo "Linting project files..."
          node --check server.js
          node --check config/db.js
          node --check models/User.js
          node --check models/CrimeStats.js
          node --check controllers/authController.js
          node --check controllers/crimeStatsController.js
          node --check middleware/auth.js
          node --check middleware/errorHandler.js
          node --check routes/authRoutes.js
          node --check routes/crimeStatsRoutes.js
          node --check services/seedService.js
          echo "✅ All files pass syntax check."

      - name: 🏥 Health check (server startup)
        env:
          PORT: 5001
          MONGO_URI: mongodb://localhost:27017/crimeIndexDB_test
          JWT_SECRET: test_secret_key_for_ci
          JWT_EXPIRES_IN: 1d
          NODE_ENV: test
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 5
          curl -f http://localhost:5001/api/health || (kill $SERVER_PID; exit 1)
          kill $SERVER_PID
          echo "✅ Server health check passed."

  # ── Build Docker Image ─────────────────────────────
  docker-build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Docker build successful
        run: echo "Docker image built successfully for commit ${{ github.sha }}"

  # ── Deploy (main branch only) ──────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🏷️ Generate release tag
        id: tag
        run: echo "tag=v$(date +'%Y%m%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: 📋 Deployment summary
        run: |
          echo "============================================"
          echo "  Crime Index Dashboard — Deployment Ready"
          echo "============================================"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Tag     : ${{ steps.tag.outputs.tag }}"
          echo "  Actor   : ${{ github.actor }}"
          echo "  Time    : $(date -u)"
          echo "============================================"
          echo ""
          echo "To deploy manually:"
          echo "  docker-compose up -d --build"
          echo ""
          echo "✅ Deployment pipeline completed successfully."
        # NOTE: Add your actual deployment steps here.
        # Examples:
        # - SSH to server and pull latest Docker image
        # - Push to container registry (Docker Hub, ECR, GCR)
        # - Trigger Render / Railway / Fly.io deployment
        # - kubectl apply for Kubernetes
